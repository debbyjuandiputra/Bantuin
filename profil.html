<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bantuin — Profil</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page-head">
  <button class="back-btn" onclick="window.location.href='index.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
  </button>
  <h2>Profil Saya</h2>
</div>

<div class="page-body">
  <div class="card" style="text-align:center">
    <div style="width:72px;height:72px;border-radius:50%;background:var(--surface-2);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;color:var(--text-soft)">
      <svg viewBox="0 0 24 24" width="34" height="34" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
    </div>
    <h3 id="pUid">-</h3>
    <p class="desc">UID Publik</p>
  </div>

  <div class="card">
    <h3>Data Akun</h3>
    <div class="stat-grid" style="grid-template-columns:1fr">

      <div class="stat-item" style="text-align:left;display:flex;justify-content:space-between;align-items:center;gap:10px">
        <span>Nama Lengkap</span><b style="font-size:14px" id="dNama">-</b>
      </div>

      <div class="stat-item" style="text-align:left;display:flex;justify-content:space-between;align-items:center;gap:10px;border-top:1px solid var(--border);margin-top:10px;padding-top:10px">
        <span>Username</span>
        <span style="display:flex;align-items:center;gap:8px">
          <b style="font-size:14px" id="dUsername">********</b>
          <button type="button" class="icon-btn" id="toggleUsernameBtn" aria-label="Lihat/Sembunyikan username" style="width:28px;height:28px">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </span>
      </div>

      <div class="stat-item" style="text-align:left;display:flex;justify-content:space-between;align-items:center;gap:10px;border-top:1px solid var(--border);margin-top:10px;padding-top:10px">
        <span>UID Publik</span>
        <span style="display:flex;align-items:center;gap:8px">
          <b style="font-size:14px" id="dUid">-</b>
          <button type="button" class="icon-btn" id="copyUidBtn" aria-label="Salin UID Publik" style="width:28px;height:28px">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
        </span>
      </div>

      <div class="stat-item" style="text-align:left;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);margin-top:10px;padding-top:10px">
        <span>Email</span><b style="font-size:14px" id="dEmail">-</b>
      </div>

      <div class="stat-item" style="text-align:left;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);margin-top:10px;padding-top:10px">
        <span>Bergabung</span><b style="font-size:14px" id="dCreatedAt">-</b>
      </div>

    </div>
  </div>

  <button class="btn outline" onclick="window.location.href='edit-profil.html'">Edit Profil</button>
  <button class="btn outline" style="margin-top:10px;color:var(--danger);border-color:var(--danger)" onclick="doLogoutProfil()">Keluar</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/store.js"></script>
<script src="js/util.js"></script>
<script>
applyStoredTheme();

let realUsername = '';
let realUid = '';
let usernameVisible = false;

function doLogoutProfil(){
  logoutUser();
  window.location.href = 'index.html';
}

function maskUsername(u){
  return '•'.repeat(Math.max(u.length, 4));
}

function renderUsername(){
  document.getElementById('dUsername').textContent = usernameVisible ? realUsername : maskUsername(realUsername);
}

requireAuth(function(u){
  realUsername = u.username;
  realUid = String(u.user_id);
  document.getElementById('pUid').textContent = '#' + u.user_id;
  document.getElementById('dUid').textContent = '#' + u.user_id;
  renderUsername();

  if(u.created_at){
    const d = new Date(u.created_at);
    document.getElementById('dCreatedAt').textContent = d.toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' });
  }

  document.getElementById('dNama').textContent = u.nama || '-';
  document.getElementById('dEmail').textContent = u.email || '-';
});

document.getElementById('toggleUsernameBtn').addEventListener('click', function(){
  usernameVisible = !usernameVisible;
  renderUsername();
});

document.getElementById('copyUidBtn').addEventListener('click', function(){
  copyText(realUid);
});
</script>
</body>
</html>
