<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bantuin — Edit Profil</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page-head">
  <button class="back-btn" onclick="window.location.href='profil.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
  </button>
  <h2>Edit Profil</h2>
</div>

<div class="page-body">
  <div class="card">
    <p class="desc">Data ini bersifat opsional dan hanya dipakai untuk keperluan seperti klaim promo.</p>
    <form id="editForm">
      <div class="field">
        <label>Nama Lengkap</label>
        <input type="text" id="namaLengkap" placeholder="Nama lengkap Anda">
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="emailField" placeholder="nama@email.com">
      </div>

      <button type="submit" class="btn" id="editBtn">Simpan Perubahan</button>
      <div class="form-msg" id="editMsg" style="color:var(--success)"></div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/store.js"></script>
<script src="js/util.js"></script>
<script>
applyStoredTheme();

requireAuth(function(u){
  document.getElementById('namaLengkap').value = u.nama || '';
  document.getElementById('emailField').value = u.email || '';
});

document.getElementById('editForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const btn = document.getElementById('editBtn');
  const msg = document.getElementById('editMsg');
  msg.textContent = '';
  btn.disabled = true; btn.textContent = 'Menyimpan...';

  const res = await updateProfile({
    nama: document.getElementById('namaLengkap').value.trim(),
    email: document.getElementById('emailField').value.trim()
  });

  btn.disabled = false; btn.textContent = 'Simpan Perubahan';

  if(res.ok){
    showToast('Profil tersimpan');
    setTimeout(()=> window.location.href = 'profil.html', 700);
  } else {
    msg.style.color = 'var(--danger)';
    msg.textContent = res.msg;
  }
});
</script>
</body>
</html>
