<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Bantuin — Cek Palet Warna</title>
<link rel="icon" type="image/png" href="../assets/favicon.png">
<link rel="stylesheet" href="../css/style.css">
<style>
.upload-area{
  border:2px dashed var(--border); border-radius:var(--radius); padding:32px 16px;
  text-align:center; cursor:pointer; transition:.2s; background:var(--surface-2);
}
.upload-area:hover,.upload-area.dragover{ border-color:var(--orange); background:rgba(245,137,27,.06); }
.upload-area svg{ margin-bottom:10px; color:var(--text-soft); }
.upload-area p{ margin:0; color:var(--text-soft); font-size:13.5px; }
.upload-area b{ color:var(--orange); }
#previewImg{ width:100%; border-radius:12px; max-height:220px; object-fit:cover; display:none; margin-top:12px; }
#workCanvas{ display:none; }
.format-tabs{ display:flex; gap:6px; margin-bottom:14px; }
.fmt-tab{
  flex:1; padding:8px 0; border:1px solid var(--border); border-radius:10px;
  background:var(--surface-2); color:var(--text-soft); font-weight:600; font-size:13px; cursor:pointer;
}
.fmt-tab.active{ background:var(--orange); color:#fff; border-color:var(--orange); }
.swatch-row{
  display:flex; align-items:center; gap:12px; padding:10px 0;
  border-bottom:1px solid var(--border);
}
.swatch-row:last-child{ border-bottom:none; }
.swatch-box{
  width:44px; height:44px; border-radius:10px; flex-shrink:0;
  box-shadow:0 2px 8px rgba(0,0,0,.12); border:1px solid var(--border);
}
.swatch-info{ flex:1; min-width:0; }
.swatch-info .code{
  font-family:'Courier New',monospace; font-size:13.5px; font-weight:700;
  color:var(--text); word-break:break-all;
}
.swatch-info .pct{ font-size:11.5px; color:var(--text-soft); margin-top:2px; }
.copy-btn{
  border:none; background:var(--surface-2); border-radius:8px; padding:7px 12px;
  font-size:12px; font-weight:600; color:var(--text-soft); cursor:pointer; flex-shrink:0;
  transition:.15s;
}
.copy-btn:active{ background:var(--orange); color:#fff; }
#resultCard canvas{ display:none; }
.progress-wrap{ margin:10px 0; }
.progress-wrap .bar-bg{ background:var(--surface-2); border-radius:99px; height:6px; width:100%; overflow:hidden; }
.progress-wrap .bar-fg{ background:var(--orange); height:6px; border-radius:99px; width:0; transition:width .4s; }
.download-row{ margin-top:16px; padding-top:14px; border-top:1px solid var(--border); }
.download-row .btn{ display:inline-flex; }
.download-row .btn svg{ flex-shrink:0; }
.download-hint{ text-align:center; font-size:11.5px; color:var(--text-soft); margin-top:8px; }
</style>
</head>
<body>
<div class="page-head">
  <button class="back-btn" onclick="history.back()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
  </button>
  <h2>Cek Palet Warna</h2>
</div>

<div class="page-body">
  <div class="card">
    <div class="upload-area" id="uploadArea" onclick="fileInput.click()"
         ondragover="ev.preventDefault();this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')"
         ondrop="ev.preventDefault();this.classList.remove('dragover');handleFiles(ev.dataTransfer.files)">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <p><b>Pilih gambar</b></p>
      <p style="margin-top:4px;font-size:11.5px">PNG, JPG, WEBP · Maks 5 MB</p>
    </div>
    <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFiles(this.files)">
    <img id="previewImg" alt="preview">
    <canvas id="workCanvas"></canvas>

    <div class="form-msg" id="uploadMsg"></div>

    <div class="progress-wrap hidden" id="progressWrap">
      <div class="bar-bg"><div class="bar-fg" id="progressBar"></div></div>
    </div>
  </div>

  <div class="card hidden" id="resultCard">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <b style="font-size:15px">Top 10 Warna Dominan</b>
    </div>

    <div class="format-tabs">
      <button class="fmt-tab active" onclick="setFormat('hex',this)">HEX</button>
      <button class="fmt-tab" onclick="setFormat('rgb',this)">RGB</button>
      <button class="fmt-tab" onclick="setFormat('hsl',this)">HSL</button>
    </div>

    <div id="swatchList"></div>

    <div class="download-row">
      <button class="btn" id="downloadBtn" onclick="downloadPaletteImage()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span id="downloadBtnLabel">Unduh Palet</span>
      </button>
      <p class="download-hint"></p>
    </div>
  </div>
</div>

<script src="../js/store.js"></script>
<script src="../js/util.js"></script>
<script src="../js/watermark-data.js"></script>
<script>
applyStoredTheme();

const fileInput = document.getElementById('fileInput');
let colorData = [];   // [{r,g,b,pct}] top 10
let currentFmt = 'hex';

function handleFiles(files){
  const file = files && files[0];
  if(!file) return;
  const msg = document.getElementById('uploadMsg');
  msg.textContent = '';
  if(!file.type.startsWith('image/')){
    msg.textContent = 'File harus berupa gambar.'; return;
  }
  if(file.size > 5 * 1024 * 1024){
    msg.textContent = 'Ukuran gambar maksimal 5 MB.'; return;
  }

  const reader = new FileReader();
  reader.onload = function(e){
    const img = document.getElementById('previewImg');
    img.onload = function(){
      img.style.display = 'block';
      analyzeImage(img);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function analyzeImage(img){
  document.getElementById('progressWrap').classList.remove('hidden');
  document.getElementById('resultCard').classList.add('hidden');
  const bar = document.getElementById('progressBar');
  bar.style.width = '20%';

  // Gambar ke canvas berukuran kecil untuk sampling cepat
  const SAMPLE_SIZE = 100;
  const canvas = document.getElementById('workCanvas');
  canvas.width = SAMPLE_SIZE;
  canvas.height = SAMPLE_SIZE;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0, SAMPLE_SIZE, SAMPLE_SIZE);
  bar.style.width = '40%';

  const data = ctx.getImageData(0, 0, SAMPLE_SIZE, SAMPLE_SIZE).data;
  bar.style.width = '60%';

  // Hitung frekuensi warna (quantize ke 8-bit per channel → ±32 bin)
  const freq = {};
  const STEP = 32;
  for(let i = 0; i < data.length; i += 4){
    const a = data[i+3];
    if(a < 128) continue; // skip transparan
    const r = Math.round(data[i]   / STEP) * STEP;
    const g = Math.round(data[i+1] / STEP) * STEP;
    const b = Math.round(data[i+2] / STEP) * STEP;
    const key = r + ',' + g + ',' + b;
    freq[key] = (freq[key] || 0) + 1;
  }
  bar.style.width = '80%';

  const total = Object.values(freq).reduce((s,v) => s+v, 0);
  const sorted = Object.entries(freq)
    .sort((a,b) => b[1]-a[1])
    .slice(0, 10)
    .map(([k, cnt]) => {
      const [r,g,b] = k.split(',').map(Number);
      return { r:clamp(r), g:clamp(g), b:clamp(b), pct: (cnt/total*100).toFixed(1) };
    });

  colorData = sorted;
  bar.style.width = '100%';

  setTimeout(function(){
    document.getElementById('progressWrap').classList.add('hidden');
    bar.style.width = '0';
    renderSwatches();
    document.getElementById('resultCard').classList.remove('hidden');
    document.getElementById('resultCard').scrollIntoView({behavior:'smooth', block:'nearest'});
  }, 300);
}

function clamp(v){ return Math.min(255, Math.max(0, v)); }

function setFormat(fmt, el){
  currentFmt = fmt;
  document.querySelectorAll('.fmt-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderSwatches();
}

function renderSwatches(){
  const list = document.getElementById('swatchList');
  list.innerHTML = colorData.map((c, i) => {
    const hex = rgbToHex(c.r, c.g, c.b);
    const rgb = `rgb(${c.r}, ${c.g}, ${c.b})`;
    const [h, s, l] = rgbToHsl(c.r, c.g, c.b);
    const hsl = `hsl(${h}, ${s}%, ${l}%)`;
    const code = currentFmt === 'hex' ? hex : currentFmt === 'rgb' ? rgb : hsl;

    return `<div class="swatch-row">
      <div class="swatch-box" style="background:${hex}"></div>
      <div class="swatch-info">
        <div class="code">${escHtml(code)}</div>
        <div class="pct">${c.pct}% dari gambar</div>
      </div>
      <button class="copy-btn" onclick="copyColor('${escAttr(code)}', this)">Salin</button>
    </div>`;
  }).join('');
}

function copyColor(text, btn){
  navigator.clipboard.writeText(text).then(function(){
    const old = btn.textContent;
    btn.textContent = '✓';
    setTimeout(function(){ btn.textContent = old; }, 1500);
  }).catch(function(){
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    btn.textContent = '✓'; setTimeout(function(){ btn.textContent = 'Salin'; }, 1500);
  });
}

function rgbToHex(r,g,b){
  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('').toUpperCase();
}

function rgbToHsl(r,g,b){
  r/=255; g/=255; b/=255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if(max===min){ h=s=0; }
  else{
    const d=max-min;
    s = l>0.5 ? d/(2-max-min) : d/(max+min);
    switch(max){
      case r: h=((g-b)/d+(g<b?6:0))/6; break;
      case g: h=((b-r)/d+2)/6; break;
      case b: h=((r-g)/d+4)/6; break;
    }
  }
  return [Math.round(h*360), Math.round(s*100), Math.round(l*100)];
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s){ return String(s).replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }

// ==========================================================
// Generate gambar palet warna (PNG) + watermark Bantuin
// ==========================================================
let __wmImgCache = null;
function loadWatermarkImg(){
  if(__wmImgCache) return Promise.resolve(__wmImgCache);
  return new Promise((resolve) => {
    if(typeof WATERMARK_B64 === 'undefined'){ resolve(null); return; }
    const img = new Image();
    img.onload = function(){ __wmImgCache = img; resolve(img); };
    img.onerror = function(){ resolve(null); };
    img.src = WATERMARK_B64;
  });
}

function getColorCode(c, fmt){
  const hex = rgbToHex(c.r, c.g, c.b);
  if(fmt === 'hex') return hex;
  if(fmt === 'rgb') return `rgb(${c.r}, ${c.g}, ${c.b})`;
  const [h,s,l] = rgbToHsl(c.r, c.g, c.b);
  return `hsl(${h}, ${s}%, ${l}%)`;
}

function roundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

async function downloadPaletteImage(){
  if(!colorData.length) return;
  const btn = document.getElementById('downloadBtn');
  const label = document.getElementById('downloadBtnLabel');
  btn.disabled = true;
  const oldLabel = label.textContent;
  label.textContent = 'Menyiapkan gambar...';

  try{
    if(document.fonts && document.fonts.ready){ await document.fonts.ready; }
    const wm = await loadWatermarkImg();

    const SCALE = 2;               // resolusi 2x biar tajam
    const W = 900;
    const PAD = 56;
    const SWATCH = 60;
    const ROW_H = 84;
    const HEADER_H = 150;
    const FOOTER_H = 150;          // zona khusus watermark, dijamin ga nimpa swatch
    const rows = colorData.length;
    const H = HEADER_H + rows * ROW_H + FOOTER_H;

    const canvas = document.createElement('canvas');
    canvas.width = W * SCALE;
    canvas.height = H * SCALE;
    const ctx = canvas.getContext('2d');
    ctx.scale(SCALE, SCALE);

    // ---- Background: putih bersih ----
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(0, 0, W, H);

    // ---- Header ----
    const fmtLabel = currentFmt.toUpperCase();
    ctx.fillStyle = '#1F2430';
    ctx.font = '700 32px Poppins, Arial, sans-serif';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText('Palet Warna', PAD, 62);

    ctx.fillStyle = '#656C7C';
    ctx.font = '500 15px Inter, Arial, sans-serif';
    ctx.fillText(`${rows} warna dominan  ·  Format ${fmtLabel}`, PAD, 88);

    ctx.strokeStyle = '#E5E7EB';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(PAD, HEADER_H - 18);
    ctx.lineTo(W - PAD, HEADER_H - 18);
    ctx.stroke();

    // ---- Baris warna ----
    colorData.forEach((c, i) => {
      const y0 = HEADER_H + i * ROW_H;
      const hex = rgbToHex(c.r, c.g, c.b);
      const code = getColorCode(c, currentFmt);
      const boxY = y0 + (ROW_H - SWATCH) / 2;

      roundRect(ctx, PAD, boxY, SWATCH, SWATCH, 14);
      ctx.fillStyle = hex;
      ctx.fill();
      ctx.lineWidth = 1;
      ctx.strokeStyle = 'rgba(0,0,0,0.08)';
      ctx.stroke();

      const textX = PAD + SWATCH + 22;
      ctx.fillStyle = '#1F2430';
      ctx.font = '700 22px "Courier New", monospace';
      ctx.fillText(code, textX, y0 + ROW_H/2 - 2);

      ctx.fillStyle = '#8A8F9C';
      ctx.font = '500 13.5px Inter, Arial, sans-serif';
      ctx.fillText(`${c.pct}% dari gambar`, textX, y0 + ROW_H/2 + 20);

      if(i < rows - 1){
        ctx.strokeStyle = '#EFE7DC';
        ctx.beginPath();
        ctx.moveTo(PAD, y0 + ROW_H - 1);
        ctx.lineTo(W - PAD, y0 + ROW_H - 1);
        ctx.stroke();
      }
    });

    // ---- Footer: watermark di zona sendiri, jauh dari swatch ----
    const footerTop = HEADER_H + rows * ROW_H;
    ctx.strokeStyle = '#E5E7EB';
    ctx.beginPath();
    ctx.moveTo(PAD, footerTop + 20);
    ctx.lineTo(W - PAD, footerTop + 20);
    ctx.stroke();

    if(wm){
      // di-zoom out (dikecilin) supaya lega & ga nabrak apa pun di atasnya
      const wmW = 170;
      const wmH = wmW * (wm.height / wm.width);
      const wmX = (W - wmW) / 2;
      const wmY = footerTop + 46;
      ctx.globalAlpha = 0.92;
      ctx.drawImage(wm, wmX, wmY, wmW, wmH);
      ctx.globalAlpha = 1;

      ctx.fillStyle = '#9BA2B4';
      ctx.font = '500 11.5px Inter, Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Palet warna dibuat otomatis lewat aplikasi Bantuin', W/2, wmY + wmH + 26);
      ctx.textAlign = 'left';
    }

    canvas.toBlob(function(blob){
      btn.disabled = false;
      label.textContent = oldLabel;
      if(!blob){ showToast('Gagal membuat gambar'); return; }
      downloadBlob(blob, `bantuin-palet-warna-${fmtLabel.toLowerCase()}.png`);
      showToast('Gambar palet berhasil diunduh');
    }, 'image/png');

  } catch(err){
    console.error('Gagal generate gambar palet:', err);
    btn.disabled = false;
    label.textContent = oldLabel;
    showToast('Gagal membuat gambar');
  }
}
</script>
</body>
</html>
