<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bantuin — Median</title>
<link rel="icon" type="image/png" href="../../assets/favicon.png">
<link rel="stylesheet" href="../../css/style.css">
<style>
.formula-block{
  background:var(--surface-2); border-radius:14px; padding:20px 16px;
  text-align:center; margin-bottom:18px;
}
.formula-main{
  font-size:22px; font-weight:700; font-family:'Poppins',sans-serif;
  color:var(--orange); line-height:1.6; letter-spacing:0.3px;
}
.formula-fraction{
  display:inline-flex; flex-direction:column; align-items:center;
  vertical-align:middle; margin:0 4px;
}
.formula-fraction .num{ border-bottom:2.5px solid var(--orange); padding:0 6px 3px; }
.formula-fraction .den{ padding:3px 6px 0; }
.formula-case{
  display:inline-flex; flex-direction:column; align-items:flex-start;
  gap:6px; vertical-align:middle; margin-left:8px; font-size:14px;
}
.formula-case div{ display:flex; align-items:center; gap:6px; }
.formula-case .cond{ font-size:11px; color:var(--text-soft); }
.formula-desc{
  font-size:13px; color:var(--text-soft); margin-top:10px; line-height:1.6;
}
.formula-legend{
  display:flex; flex-wrap:wrap; gap:8px 18px; justify-content:center;
  font-size:12.5px; color:var(--text-soft); margin-top:8px;
}
.formula-legend span b{ color:var(--orange); font-style:italic; }

.data-inputs{ display:flex; flex-direction:column; gap:8px; margin:12px 0; }
.data-row{ display:flex; align-items:center; gap:8px; }
.data-row label{
  font-size:12.5px; color:var(--text-soft); font-style:italic; font-weight:600;
  min-width:24px; text-align:right; flex-shrink:0;
}
.data-row input{
  flex:1; padding:10px 12px; border:1px solid var(--border); border-radius:10px;
  background:var(--surface); color:var(--text); font-size:14px; outline:none;
  transition:border-color .2s;
}
.data-row input:focus{ border-color:var(--orange); }
.data-row .rm-btn{
  width:32px; height:32px; border-radius:8px; border:none;
  background:var(--surface-2); color:var(--text-soft); font-size:18px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; cursor:pointer;
}
.data-row .rm-btn:hover{ background:var(--danger); color:#fff; }

.add-row{ display:flex; gap:8px; flex-wrap:wrap; margin-top:4px; }
.add-btn{
  flex:1; min-width:80px; padding:9px 0; border-radius:10px; border:1.5px dashed var(--border);
  background:transparent; color:var(--text-soft); font-size:13px; font-weight:600; cursor:pointer;
  transition:border-color .2s, color .2s;
}
.add-btn:hover{ border-color:var(--orange); color:var(--orange); }

.result-box{
  background:var(--surface-2); border-radius:12px; padding:16px; text-align:center; margin-top:14px;
}
.result-label{ font-size:12px; color:var(--text-soft); margin-bottom:4px; }
.result-value{ font-size:32px; font-weight:800; font-family:'Poppins',sans-serif; color:var(--orange); }
.result-formula{ font-size:12.5px; color:var(--text-soft); margin-top:6px; word-break:break-all; }

.sorted-display{
  background:var(--surface-2); border-radius:10px; padding:10px 12px;
  font-size:13px; color:var(--text-soft); margin-top:10px; word-break:break-all; line-height:1.6;
}
.sorted-display b{ color:var(--orange); }
</style>
</head>
<body>

<div class="page-head">
  <button class="back-btn" onclick="window.location.href='../statistik.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
  </button>
  <h2>Median</h2>
</div>

<div class="page-body">

  <!-- Rumus -->
  <div class="formula-block">
    <div class="formula-main">
      <div style="margin-bottom:6px">
        <span style="font-style:italic">Me</span>
        <span style="font-size:18px;color:var(--text);font-weight:500;margin:0 8px">=</span>
        <span style="font-style:italic">x</span><sub style="font-size:13px">&lfloor;(n+1)/2&rfloor;</sub>
        <span style="font-size:14px;color:var(--text-soft);margin-left:8px">(n ganjil)</span>
      </div>
      <div>
        <span style="font-style:italic">Me</span>
        <span style="font-size:18px;color:var(--text);font-weight:500;margin:0 8px">=</span>
        <span class="formula-fraction">
          <span class="num">
            <span style="font-style:italic">x</span><sub style="font-size:11px">n/2</sub>
            <span style="font-size:16px;font-weight:400"> + </span>
            <span style="font-style:italic">x</span><sub style="font-size:11px">n/2+1</sub>
          </span>
          <span class="den">2</span>
        </span>
        <span style="font-size:14px;color:var(--text-soft);margin-left:8px">(n genap)</span>
      </div>
    </div>
    <div class="formula-desc">
      Urutkan data dari kecil ke besar. Jika jumlah data ganjil, median adalah nilai tengahnya.
      Jika genap, median adalah rata-rata dua nilai tengah.
    </div>
    <div class="formula-legend">
      <span><b>Me</b> = median</span>
      <span><b>n</b> = banyaknya data</span>
      <span><b>x</b> = data terurut</span>
    </div>
  </div>

  <!-- Input -->
  <div class="card">
    <h3>Masukkan Data</h3>
    <div class="data-inputs" id="dataInputs"></div>

    <div class="add-row">
      <button class="add-btn" onclick="addOne()">+ 1 data</button>
      <button class="add-btn" onclick="addFive()">+ 5 data</button>
      <button class="add-btn" onclick="addTen()">+ 10 data</button>
    </div>

    <div class="form-msg" id="calcMsg" style="margin-top:10px"></div>

    <button class="btn" style="margin-top:14px" onclick="calculate()">Hitung Median</button>
    <button class="btn secondary" style="margin-top:8px" onclick="resetAll()">Reset</button>
  </div>

  <!-- Hasil -->
  <div class="card hidden" id="resultCard">
    <h3>Hasil</h3>
    <div class="sorted-display" id="sortedDisplay"></div>
    <div class="result-box">
      <div class="result-label">Median (Me)</div>
      <div class="result-value" id="resultVal">0</div>
      <div class="result-formula" id="resultFormula"></div>
    </div>
    <button class="btn secondary" style="margin-top:14px" onclick="copyText(document.getElementById('resultVal').textContent)">Salin Hasil</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../../js/supabase-config.js"></script>
<script src="../../js/store.js"></script>
<script src="../../js/util.js"></script>
<script>
applyStoredTheme();

let dataCount = 0;

function addRow(){
  dataCount++;
  const wrap = document.getElementById('dataInputs');
  const row = document.createElement('div');
  row.className = 'data-row';
  row.id = 'row-' + dataCount;
  const idx = dataCount;
  row.innerHTML = `
    <label>x<sub style="font-size:9px">${idx}</sub></label>
    <input type="number" id="xi-${idx}" placeholder="Nilai ke-${idx}" step="any">
    <button class="rm-btn" onclick="removeRow(${idx})" title="Hapus">×</button>
  `;
  wrap.appendChild(row);
  document.getElementById('xi-' + idx).focus();
}

function removeRow(idx){
  const row = document.getElementById('row-' + idx);
  if(row) row.remove();
}

function addOne(){ addRow(); }

function addFive(){
  const current = document.querySelectorAll('#dataInputs .data-row').length;
  const toAdd = current === 1 ? 4 : 5;
  for(let i = 0; i < toAdd; i++) addRow();
}

function addTen(){
  const current = document.querySelectorAll('#dataInputs .data-row').length;
  const toAdd = current === 1 ? 9 : 10;
  for(let i = 0; i < toAdd; i++) addRow();
}

function getValues(){
  const inputs = document.querySelectorAll('#dataInputs input[type="number"]');
  const vals = [];
  inputs.forEach(inp => {
    const v = parseFloat(inp.value);
    if(!isNaN(v)) vals.push(v);
  });
  return vals;
}

function calculate(){
  const vals = getValues();
  const msg = document.getElementById('calcMsg');
  if(vals.length === 0){
    msg.style.color = 'var(--danger)';
    msg.textContent = 'Masukkan minimal 1 nilai data.';
    return;
  }
  msg.textContent = '';

  const sorted = [...vals].sort((a,b) => a - b);
  const n = sorted.length;
  let median, formulaStr;

  if(n % 2 === 1){
    // Ganjil
    const midIdx = Math.floor(n / 2);
    median = sorted[midIdx];
    const pos = midIdx + 1;
    formulaStr = `n = ${n} (ganjil) → posisi tengah ke-${pos} → Median = ${median}`;
  } else {
    // Genap
    const lo = sorted[n/2 - 1], hi = sorted[n/2];
    median = (lo + hi) / 2;
    const medStr = Number.isInteger(median) ? median.toString() : median.toFixed(4).replace(/\.?0+$/,'');
    formulaStr = `n = ${n} (genap) → (${lo} + ${hi}) ÷ 2 = ${lo + hi} ÷ 2 = ${medStr}`;
    median = medStr;
  }

  // Highlight nilai tengah
  const highlighted = sorted.map((v, i) => {
    if(n % 2 === 1 && i === Math.floor(n/2)) return `<b>${v}</b>`;
    if(n % 2 === 0 && (i === n/2 - 1 || i === n/2)) return `<b>${v}</b>`;
    return v;
  });
  document.getElementById('sortedDisplay').innerHTML =
    `Data terurut: ${highlighted.join(', ')}`;

  document.getElementById('resultVal').textContent = median;
  document.getElementById('resultFormula').textContent = formulaStr;
  document.getElementById('resultCard').classList.remove('hidden');
  document.getElementById('resultCard').scrollIntoView({behavior:'smooth', block:'nearest'});
}

function resetAll(){
  document.getElementById('dataInputs').innerHTML = '';
  dataCount = 0;
  document.getElementById('calcMsg').textContent = '';
  document.getElementById('resultCard').classList.add('hidden');
  addRow();
}

addRow();
</script>
</body>
</html>
