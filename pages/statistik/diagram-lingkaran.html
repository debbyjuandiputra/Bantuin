<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bantuin — Diagram Lingkaran</title>
<link rel="icon" type="image/png" href="../../assets/favicon.png">
<link rel="stylesheet" href="../../css/style.css">
<style>
.input-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.input-row input{flex:1;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;outline:none}
.input-row input:focus{border-color:var(--orange)}
.input-row .color-dot{width:22px;height:22px;border-radius:50%;flex-shrink:0;border:2px solid var(--border)}
.input-row .del-btn{background:none;border:none;color:var(--danger);font-size:20px;cursor:pointer;padding:0 4px;line-height:1;flex-shrink:0}
.legend-box{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px}
.legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
canvas{max-width:100%;display:block;margin:0 auto;border-radius:12px}
</style>
</head>
<body>
<div class="page-head">
  <button class="back-btn" onclick="history.back()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
  </button>
  <h2>Diagram Lingkaran</h2>
</div>

<div class="page-body">
  <div class="card">
    <div class="field">
      <label>Judul Diagram</label>
      <input type="text" id="chartTitle" placeholder="Contoh: Distribusi Nilai Siswa" maxlength="80">
    </div>

    <label class="field" style="margin-bottom:8px">
      <span style="display:block;font-size:13px;font-weight:600;color:var(--text-soft);margin-bottom:8px">Data (Label & Nilai)</span>
    </label>
    <div id="dataRows"></div>

    <button class="btn secondary small" style="width:100%;margin-top:4px;margin-bottom:16px" onclick="addRow()">+ Tambah Data</button>

    <button class="btn" style="width:100%" onclick="drawChart()">Buat Diagram</button>
    <div class="form-msg" id="chartMsg"></div>
  </div>

  <div class="card hidden" id="resultCard">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <b style="font-size:14px">Hasil</b>
      <button class="btn small" onclick="downloadChart()">Unduh PNG</button>
    </div>
    <canvas id="pieCanvas"></canvas>
    <div class="legend-box" id="legend"></div>
  </div>
</div>

<script src="../../js/store.js"></script>
<script src="../../js/util.js"></script>

let rowCount = 0;

function addRow(label='', value=''){
  rowCount++;
  const idx = rowCount - 1;
  const color = PALETTE[idx % PALETTE.length];
  const div = document.createElement('div');
  div.className = 'input-row';
  div.id = 'row-' + rowCount;
  div.innerHTML = `
    <div class="color-dot" style="background:${color}" id="cdot-${rowCount}"></div>
    <input type="text" placeholder="Label" id="lbl-${rowCount}" value="${escapeAttr(label)}" maxlength="50">
    <input type="number" placeholder="Nilai" id="val-${rowCount}" value="${value}" min="0" step="any" style="max-width:90px">
    <button class="del-btn" onclick="removeRow(${rowCount})" title="Hapus">×</button>`;
  document.getElementById('dataRows').appendChild(div);
}

function removeRow(id){
  const el = document.getElementById('row-' + id);
  if(el) el.remove();
}

function escapeAttr(s){ return String(s).replace(/"/g,'&quot;'); }

function getRows(){
  const rows = [];
  document.querySelectorAll('#dataRows .input-row').forEach((row, i) => {
    const id = row.id.split('-')[1];
    const label = document.getElementById('lbl-' + id)?.value.trim() || '';
    const val = parseFloat(document.getElementById('val-' + id)?.value);
    if(label && !isNaN(val) && val > 0){
      rows.push({ label, value: val, color: PALETTE[i % PALETTE.length] });
    }
  });
  return rows;
}

async function drawChart(){
  const msg = document.getElementById('chartMsg');
  msg.textContent = '';
  const rows = getRows();
  if(rows.length < 2){ msg.textContent = 'Masukkan minimal 2 data.'; return; }

  const title = document.getElementById('chartTitle').value.trim();
  const total = rows.reduce((s,r) => s + r.value, 0);

  const canvas = document.getElementById('pieCanvas');
  const W = 340, H = 340;
  canvas.width = W * 2;
  canvas.height = H * 2;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(2, 2);
  ctx.clearRect(0, 0, W, H);

  // Latar belakang
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--surface').trim() || '#ffffff';
  ctx.fillRect(0, 0, W, H);

  // Judul
  if(title){
    ctx.font = 'bold 14px system-ui,sans-serif';
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text').trim() || '#1c1c1e';
    ctx.textAlign = 'center';
    ctx.fillText(title, W/2, 22);
  }

  // Gambar pie
  const cx = W/2, cy = title ? 150 : 140, r = 100;
  let startAngle = -Math.PI / 2;
  rows.forEach(row => {
    const slice = (row.value / total) * 2 * Math.PI;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, startAngle + slice);
    ctx.closePath();
    ctx.fillStyle = row.color;
    ctx.fill();
    ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--bg').trim() || '#f5f5f5';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Label persen jika cukup besar
    const pct = (row.value / total * 100);
    if(pct >= 5){
      const midAngle = startAngle + slice / 2;
      const lx = cx + r * 0.65 * Math.cos(midAngle);
      const ly = cy + r * 0.65 * Math.sin(midAngle);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 10px system-ui,sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(pct.toFixed(1) + '%', lx, ly);
    }
    startAngle += slice;
  });

  // Legend di bawah
  const legendY = cy + r + 18;
  const colW = 100, cols = Math.min(3, rows.length);
  rows.forEach((row, i) => {
    const col = i % cols;
    const row_ = Math.floor(i / cols);
    const lx = (W - cols * colW) / 2 + col * colW + 10;
    const ly = legendY + row_ * 18;
    ctx.beginPath();
    ctx.arc(lx + 5, ly + 5, 5, 0, 2 * Math.PI);
    ctx.fillStyle = row.color;
    ctx.fill();
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text').trim() || '#1c1c1e';
    ctx.font = '10px system-ui,sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    const pct2 = (row.value / total * 100).toFixed(1);
    ctx.fillText(row.label + ' (' + pct2 + '%)', lx + 13, ly);
  });

  // Watermark (data URI bawaan, jadi tidak perlu ambil file eksternal
  // dan tidak membuat canvas "tainted" walau dibuka langsung dari file lokal)
  const wmImg = await new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = WATERMARK_SRC;
  });
  if(wmImg){
    const wmW = 80, wmH = wmImg.height * (wmW / wmImg.width);
    ctx.globalAlpha = 0.55;
    ctx.drawImage(wmImg, 8, H - wmH - 8, wmW, wmH);
    ctx.globalAlpha = 1;
  }

  // Render legend HTML
  document.getElementById('legend').innerHTML = rows.map(r => {
    const pct = (r.value/total*100).toFixed(1);
    return `<div class="legend-item"><div class="legend-dot" style="background:${r.color}"></div>${escapeHtml(r.label)} — ${pct}%</div>`;
  }).join('');

  document.getElementById('resultCard').classList.remove('hidden');
  document.getElementById('resultCard').scrollIntoView({behavior:'smooth', block:'nearest'});
}

function downloadChart(){
  const canvas = document.getElementById('pieCanvas');
  try {
    canvas.toBlob(function(blob){
      if(!blob){ showToast('Gagal membuat file gambar.'); return; }
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.download = 'diagram-lingkaran.png';
      link.href = url;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      setTimeout(() => URL.revokeObjectURL(url), 3000);
    }, 'image/png');
  } catch(e) {
    showToast('Gagal mengunduh, coba lagi.');
  }
}

function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Init 3 baris default
addRow('Data A', 40);
addRow('Data B', 35);
addRow('Data C', 25);
</script>
