<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bantuin — URL Encode & Decode</title>
<link rel="icon" type="image/png" href="../assets/favicon.png">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="page-head">
  <button class="back-btn" onclick="window.location.href='../index.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
  </button>
  <h2>URL Encode &amp; Decode</h2>
</div>

<div class="page-body">
  <div class="card">
    <div class="tab-row">
      <button class="active" id="tabEncodeBtn" onclick="switchMode('encode')">Encode</button>
      <button id="tabDecodeBtn" onclick="switchMode('decode')">Decode</button>
    </div>

    <div class="field">
      <label id="inputLabel">Teks / URL Asli</label>
      <textarea id="urlInput" rows="6" placeholder="Ketik atau tempel teks/URL di sini..."></textarea>
    </div>

    <button class="btn" onclick="processUrl()">Proses</button>
    <div class="form-msg" id="urlMsg"></div>

    <div class="field" style="margin-top:16px">
      <label id="outputLabel">Hasil Encode</label>
      <div class="copy-row">
        <input type="text" id="urlOutput" readonly placeholder="Hasil akan tampil di sini">
        <button class="icon-btn" onclick="copyText(document.getElementById('urlOutput').value)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/store.js"></script>
<script src="../js/util.js"></script>
<script>
applyStoredTheme();

let mode = 'encode';

function switchMode(m){
  mode = m;
  document.getElementById('tabEncodeBtn').classList.toggle('active', m==='encode');
  document.getElementById('tabDecodeBtn').classList.toggle('active', m==='decode');
  document.getElementById('inputLabel').textContent = m==='encode' ? 'Teks / URL Asli' : 'Teks Ter-encode';
  document.getElementById('outputLabel').textContent = m==='encode' ? 'Hasil Encode' : 'Hasil Decode';
  document.getElementById('urlInput').value = '';
  document.getElementById('urlOutput').value = '';
  document.getElementById('urlMsg').textContent = '';
}

function processUrl(){
  const input = document.getElementById('urlInput').value;
  const msg = document.getElementById('urlMsg');
  msg.textContent = '';

  if(!input){ msg.textContent = 'Masukkan teks terlebih dahulu.'; return; }

  try{
    const result = mode === 'encode' ? encodeURIComponent(input) : decodeURIComponent(input);
    document.getElementById('urlOutput').value = result;
  }catch(err){
    msg.textContent = 'Format tidak valid untuk di-decode (mengandung karakter % yang salah).';
  }
}
</script>
</body>
</html>
