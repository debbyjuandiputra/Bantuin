<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bantuin — Cek Panjang Karakter</title>
<link rel="icon" type="image/png" href="../assets/favicon.png">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="page-head">
  <button class="back-btn" onclick="window.location.href='../index.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
  </button>
  <h2>Cek Panjang Karakter</h2>
</div>

<div class="page-body">
  <div class="card">
    <div class="tab-row">
      <button class="active" id="tabTextBtn" onclick="switchSource('text')">Via Teks</button>
      <button id="tabFileBtn" onclick="switchSource('file')">Via File</button>
    </div>

    <div id="srcText">
      <div class="field">
        <textarea id="textInput" rows="7" placeholder="Tempel atau ketik teks di sini..."></textarea>
      </div>
      <button class="btn" onclick="processText()">Analisis Teks</button>
    </div>

    <div id="srcFile" class="hidden">
      <div class="dropzone" onclick="document.getElementById('fileInput').click()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <div id="fileLabel">Ketuk untuk pilih file (.txt, .docx, .pdf, dll)</div>
      </div>
      <input type="file" id="fileInput" class="hidden" accept=".txt,.docx,.pdf,.csv,.md,.rtf">
    </div>

    <div class="form-msg" id="charMsg"></div>
  </div>

  <div class="card hidden" id="statCard">
    <h3>Hasil Analisis</h3>
    <div class="stat-grid">
      <div class="stat-item"><b id="stChar">0</b><span>Karakter</span></div>
      <div class="stat-item"><b id="stCharNoSpace">0</b><span>Tanpa Spasi</span></div>
      <div class="stat-item"><b id="stWord">0</b><span>Kata</span></div>
      <div class="stat-item"><b id="stSentence">0</b><span>Kalimat</span></div>
      <div class="stat-item"><b id="stPara">0</b><span>Paragraf</span></div>
      <div class="stat-item"><b id="stAvgWordPerSentence">0</b><span>Kata/Kalimat</span></div>
    </div>

    <div class="stat-grid" style="grid-template-columns:1fr;margin-top:10px">
      <div class="stat-item" style="text-align:left;display:flex;justify-content:space-between;align-items:center">
        <span>Perkiraan Waktu Baca</span><b id="stReadTime" style="font-size:15px">-</b>
      </div>
    </div>

    <div style="margin-top:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <label style="display:block;font-size:13px;font-weight:600;color:var(--text-soft)">Top 5 Kata Kunci</label>
        <div style="display:flex;gap:4px" id="ngramTabs">
          <button class="ngram-tab active" onclick="setNgram(1,this)">1 Kata</button>
          <button class="ngram-tab" onclick="setNgram(2,this)">2 Kata</button>
          <button class="ngram-tab" onclick="setNgram(3,this)">3 Kata</button>
        </div>
      </div>
      <div class="keyword-chips" id="keywordChips"></div>
    </div>

    <div class="field" style="margin-top:16px">
      <label>Cari Teks / Kalimat</label>
      <input type="text" id="searchInput" placeholder="Ketik kata atau frasa..." oninput="doSearch()">
    </div>
    <div class="form-msg" id="searchResultMsg" style="color:var(--text)"></div>

    <div class="result-box" id="previewBox" style="max-height:260px;overflow:auto"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/store.js"></script>
<script src="../js/util.js"></script>
<script>
applyStoredTheme();
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let currentSource = 'text';
let fullText = '';
let lastWords = [];
let ngramSize = 1;

function setNgram(n, el){
  ngramSize = n;
  document.querySelectorAll('.ngram-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  if(lastWords.length) renderKeywords(lastWords);
}

function switchSource(mode){
  currentSource = mode;
  document.getElementById('tabTextBtn').classList.toggle('active', mode==='text');
  document.getElementById('tabFileBtn').classList.toggle('active', mode==='file');
  document.getElementById('srcText').classList.toggle('hidden', mode!=='text');
  document.getElementById('srcFile').classList.toggle('hidden', mode!=='file');
}

const STOPWORDS_ID = new Set(`yang dan di ke dari ini itu untuk dengan pada adalah akan atau juga
tidak saya kamu dia mereka kita ada dalam oleh tersebut sebagai karena jika agar dapat bisa saja
sudah belum masih lebih paling sangat hanya harus mau ingin nya kah lah pun para antara bagi hingga
sampai tanpa tentang terhadap seperti maka namun tetapi melainkan meskipun walaupun apabila ketika
saat sebelum sesudah setelah atas bawah luar depan belakang kanan kiri yaitu yakni bahwa such begitu
demikian tadi nanti kini kemudian lalu serta pula memang tentu jadi apa siapa mana kapan bagaimana
mengapa kenapa semua setiap tiap banyak sedikit satu dua tiga si sang per bukan iya ya oh eh nah deh
dong kok sih tuh kek nih situ sini sana kami anda beliau ia mu ku'`.split(/\s+/).filter(Boolean));

function processText(){
  const text = document.getElementById('textInput').value;
  if(!text.trim()){ document.getElementById('charMsg').textContent = 'Masukkan teks terlebih dahulu.'; return; }
  document.getElementById('charMsg').textContent = '';
  analyze(text);
}

function analyze(text){
  fullText = text;
  const trimmed = text.trim();

  const chars = text.length;
  const charsNoSpace = text.replace(/\s/g, '').length;

  const words = trimmed ? (trimmed.match(/[\p{L}\p{N}'-]+/gu) || []) : [];
  const wordCount = words.length;

  const sentenceMatches = text.match(/[^.!?]+[.!?]+/g) || (trimmed ? [text] : []);
  const sentenceCount = sentenceMatches.length;

  const paragraphCount = text.split(/\n\s*\n/).map(p => p.trim()).filter(p => p.length > 0).length || (trimmed ? 1 : 0);

  const avgWordPerSentence = sentenceCount > 0 ? (wordCount / sentenceCount) : 0;

  // Waktu baca: asumsi kecepatan baca rata-rata 200 kata/menit
  const readMinutes = wordCount / 200;
  let readTimeLabel = '< 1 menit';
  if(readMinutes >= 1){
    const rounded = Math.round(readMinutes);
    readTimeLabel = `~${rounded} menit`;
  }

  document.getElementById('stChar').textContent = chars;
  document.getElementById('stCharNoSpace').textContent = charsNoSpace;
  document.getElementById('stWord').textContent = wordCount;
  document.getElementById('stSentence').textContent = sentenceCount;
  document.getElementById('stPara').textContent = paragraphCount;
  document.getElementById('stAvgWordPerSentence').textContent = avgWordPerSentence.toFixed(1);
  document.getElementById('stReadTime').textContent = readTimeLabel;

  lastWords = words;
  renderKeywords(words);

  document.getElementById('statCard').classList.remove('hidden');
  document.getElementById('previewBox').textContent = text.slice(0, 3000) + (text.length > 3000 ? '...' : '');
  document.getElementById('searchInput').value = '';
  document.getElementById('searchResultMsg').textContent = '';
}

// Top 5 kata kunci berdasarkan persentase kemunculan
function renderKeywords(words){
  const holder = document.getElementById('keywordChips');
  const cleaned = words.map(w => w.toLowerCase()).filter(w => w.length > 1);

  let tokens = [];
  if(ngramSize === 1){
    tokens = cleaned.filter(w => w.length > 2 && !STOPWORDS_ID.has(w));
  } else {
    // Bangun ngram dari cleaned (tanpa filter stopword dulu, stopword hanya diabaikan di edge)
    const allWords = cleaned;
    for(let i = 0; i <= allWords.length - ngramSize; i++){
      const gram = allWords.slice(i, i + ngramSize);
      // Abaikan kalau semua kata di ngram adalah stopword
      if(gram.every(w => STOPWORDS_ID.has(w))) continue;
      // Minimal ada 1 kata bukan stopword dan bukan kata sangat pendek
      if(gram.some(w => !STOPWORDS_ID.has(w) && w.length > 2)){
        tokens.push(gram.join(' '));
      }
    }
  }

  if(tokens.length === 0){
    holder.innerHTML = '<span style="font-size:12px;color:var(--text-soft)">Belum ada kata kunci yang menonjol.</span>';
    return;
  }

  const freq = {};
  tokens.forEach(t => { freq[t] = (freq[t] || 0) + 1; });

  const total = tokens.length;
  const top5 = Object.entries(freq)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 5);

  holder.innerHTML = top5.map(([phrase, count]) => {
    const pct = ((count / total) * 100).toFixed(1);
    return `<div class="keyword-chip">${escapeHtml(phrase)} <span>${pct}%</span></div>`;
  }).join('');
}

function doSearch(){
  const q = document.getElementById('searchInput').value;
  const msg = document.getElementById('searchResultMsg');
  if(!q){ msg.textContent = ''; document.getElementById('previewBox').innerHTML = escapeHtml(fullText.slice(0,3000)); return; }
  const regex = new RegExp(escapeRegex(q), 'gi');
  const matches = fullText.match(regex);
  const count = matches ? matches.length : 0;
  msg.textContent = `Ditemukan ${count} kecocokan untuk "${q}"`;
  const highlighted = escapeHtml(fullText.slice(0,3000)).replace(new RegExp(escapeRegex(escapeHtml(q)),'gi'), m => `<mark style="background:var(--orange-light);color:#1f2430;border-radius:3px">${m}</mark>`);
  document.getElementById('previewBox').innerHTML = highlighted;
}

document.getElementById('fileInput').addEventListener('change', async function(){
  const file = this.files[0];
  if(!file) return;
  document.getElementById('fileLabel').textContent = file.name;
  document.getElementById('charMsg').textContent = 'Memproses file...';

  try{
    const ext = file.name.split('.').pop().toLowerCase();
    let text = '';

    if(ext === 'docx'){
      const arrayBuffer = await file.arrayBuffer();
      const result = await mammoth.extractRawText({arrayBuffer});
      text = result.value;
    } else if(ext === 'pdf'){
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
      let full = '';
      for(let i=1;i<=pdf.numPages;i++){
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        full += content.items.map(it => it.str).join(' ') + '\n\n';
      }
      text = full;
    } else {
      text = await file.text();
    }

    document.getElementById('charMsg').textContent = '';
    analyze(text);
  }catch(err){
    document.getElementById('charMsg').textContent = 'Gagal membaca file ini. Coba format lain (.txt, .docx, .pdf).';
  }
});
</script>
</body>
</html>
